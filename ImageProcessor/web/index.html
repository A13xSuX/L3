<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <style>
        .file-upload{
            width: 100%;
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        .file-upload .file-upload__area{
            width : 600px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            justify-content: center;
            border: 2px dashed #ccc;
            margin-top: 40px;
        }
        .file-preview-container {
            display: flex;
            justify-content: center;
            margin: 10px auto 20px;
        }

        .file-preview {
            display: grid;
            max-width: 1000px;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 20px;
        }

        .file-preview .file-preview__el {
            border: 2px dashed rgb(112, 102, 245);
            padding: 5px;
            max-height: 200px;
        }

        .file-preview .file-preview__el .file-preview__img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .file-preview .file-preview__el .file-preview__img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .file-preview__meta {
            font-family: Arial, sans-serif;
            font-size: 12px;
            word-break: break-all;
            opacity: 0.85;
        }

        .file-preview__btn {
            cursor: pointer;
            border: 1px solid #ddd;
            background: #fff;
            padding: 6px 8px;
            border-radius: 6px;
        }

        .file-preview__btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
    <title>Image Processing</title>
</head>
<body>
    <div class="file-preview-container">
        <div class="file-preview" id="file-preview"></div>
    </div>
    <div class="file-upload">
        <div class="file-upload__area">
            <h3>Upload</h3>
            <input type="file" name="" id="mulitple_files_upload" multiple />
        </div>
    </div>
    <script>
        const SERVER_ENDPOINT = "http://localhost:8080";
        const IMAGE_PREVIEW = document.getElementById("file-preview");
        const INPUT = document.getElementById("mulitple_files_upload");

        function createImageCard(id) {
            const imgHolder = document.createElement("div");
            imgHolder.classList.add("file-preview__el");

            const imgElement = document.createElement("img");
            imgElement.classList.add("file-preview__img");
            imgElement.src = `${SERVER_ENDPOINT}/image/${encodeURIComponent(id)}`;

            const meta = document.createElement("div");
            meta.classList.add("file-preview__meta");
            meta.textContent = id;

            const btn = document.createElement("button");
            btn.classList.add("file-preview__btn");
            btn.textContent = "Delete";

            btn.addEventListener("click", async () => {
                btn.disabled = true;
                btn.textContent = "Deleting...";

                try {
                    const res = await fetch(`${SERVER_ENDPOINT}/image/${encodeURIComponent(id)}`, {
                        method: "DELETE",
                    });

                    if (res.status === 204) {
                        imgHolder.remove();
                        return;
                    }

                    // Если пришло не 204, попробуем прочитать текст/JSON ошибки
                    let msg = `Delete failed (status ${res.status})`;
                    try {
                        const data = await res.json();
                        msg = data.message || data.error || msg;
                    } catch (_) {}
                    alert(msg);

                    btn.disabled = false;
                    btn.textContent = "Delete";
                } catch (e) {
                    alert(e.message || "Network error");
                    btn.disabled = false;
                    btn.textContent = "Delete";
                }
            });

            imgHolder.appendChild(imgElement);
            imgHolder.appendChild(meta);
            imgHolder.appendChild(btn);

            return imgHolder;
        }

        INPUT.addEventListener("change", async (event) => {
            try {
                const files = event.target.files;
                if (!files || files.length === 0) return;

                const formData = new FormData();
                for (const file of files) {
                    formData.append("images", file);
                }

                const res = await fetch(`${SERVER_ENDPOINT}/upload`, {
                    method: "POST",
                    body: formData,
                });

                const data = await res.json();

                const ids = data.ids || [];
                ids.forEach((id) => {
                    const card = createImageCard(id);
                    IMAGE_PREVIEW.appendChild(card);
                });

                INPUT.value = "";
            } catch (error) {
                alert(error.message || "Upload failed");
            }
        });
    </script>
</body>
</html>
